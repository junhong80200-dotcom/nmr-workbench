<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMR工作台 - 翻译+模板+库存批量导入</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Arial; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #1e3a5f; font-size: 1.8rem; margin-bottom: 0.2rem; }
        .sub { color: #4a627a; margin-bottom: 2rem; border-left: 4px solid #2c7da0; padding-left: 1rem; }
        .card { background: white; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 2rem; padding: 1.5rem; }
        .card h2 { margin-top: 0; color: #1e4663; font-size: 1.4rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; }
        label { font-weight: 600; display: block; margin-top: 0.8rem; margin-bottom: 0.3rem; color: #2c3e50; }
        input, textarea, select { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 0.9rem; font-family: inherit; }
        button { background: #2c7da0; color: white; border: none; padding: 8px 16px; border-radius: 24px; font-weight: 600; margin-top: 1rem; cursor: pointer; }
        button:hover { background: #1f5e7a; }
        .copy-btn { background: #3b82f6; }
        .result-area { background: #f8fafc; border-radius: 12px; padding: 1rem; margin-top: 1rem; border: 1px solid #e2e8f0; font-family: monospace; white-space: pre-wrap; }
        .info-note { font-size: 0.8rem; color: #5b6e8c; margin-top: 0.5rem; }
        .flex-buttons { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .template-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .template-btn { background: #e2e8f0; color: #1e4663; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; margin-top: 0; cursor: pointer; }
        .template-btn:hover { background: #cbd5e1; }
        .add-template { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
        .add-template input { flex: 1; margin-top: 0; }
        .stock-batch { background: #fef9e3; padding: 1rem; border-radius: 12px; margin-bottom: 1rem; }
        .location-list { max-height: 250px; overflow-y: auto; margin-top: 1rem; }
        .loc-item { background: #f1f5f9; margin: 0.3rem 0; padding: 0.5rem; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #e11d48; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; }
        .delete-btn:hover { background: #be123c; }
        .zh-box { background: #eef2ff; padding: 1rem; border-radius: 12px; margin: 1rem 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔬 NMR 工作台 · 最终版</h1>
    <div class="sub">🇨🇳 中文写描述 → 自动译英文 · 库存批量导入 · 无需IT批准</div>

    <!-- 模块1：Agile 填表助手 -->
    <div class="card">
        <h2>📋 模块1：Agile 填表助手</h2>
        <label>Lot Quantity (从MES复制)</label>
        <input type="text" id="lotQty" placeholder="例如 500">
        <label>Reject Quantity (手动填写)</label>
        <input type="text" id="rejectQty" placeholder="例如 3">

        <!-- 方式1：英文模板（离线） -->
        <label>📌 方式1：点击英文模板（离线）</label>
        <div class="template-buttons" id="templateButtons"></div>
        <div class="add-template">
            <input type="text" id="newTemplate" placeholder="新增英文模板，例如：Surface crack > 2mm">
            <button id="addTemplateBtn" style="margin-top:0; background:#4b5563;">+ 添加模板</button>
        </div>

        <!-- 方式2：中文翻译（需联网） -->
        <div class="zh-box">
            <label>🌐 方式2：写中文 → 自动翻译成英文（需要网络）</label>
            <textarea id="zhInput" rows="2" placeholder="例如：零件表面有划痕，长度超过5mm"></textarea>
            <div class="flex-buttons">
                <button id="translateBtn" style="background:#4f46e5;">🌐 翻译成简单英文</button>
                <button id="useTranslatedBtn" style="background:#10b981;">✓ 使用此英文</button>
            </div>
            <div class="result-area" id="translatedResult" style="margin-top: 0.5rem;">翻译后的英文会显示在这里</div>
        </div>

        <label>✏️ Non‑conforming Description (最终英文，可手动修改)</label>
        <textarea id="defectDesc" rows="2" placeholder="英文描述会出现在这里，你也可以直接修改"></textarea>

        <div class="flex-buttons">
            <button id="generateBtn">✨ 生成 Agile 文本</button>
            <button id="copyResultBtn" class="copy-btn">📋 复制结果</button>
        </div>
        <div class="result-area" id="agileResult">等待生成...</div>
    </div>

    <!-- 模块2：库存位置速查（批量导入） -->
    <div class="card">
        <h2>📍 模块2：库存位置速查</h2>
        <div class="stock-batch">
            <p><strong>📋 批量导入物料位置</strong> — 从 SAP 复制两列数据（物料号 + 位置），粘贴到下面，点击导入。</p>
            <textarea id="batchPaste" rows="4" placeholder="例如：&#10;PN12345, A3-2排&#10;PN67890, B1-05架"></textarea>
            <div class="flex-buttons">
                <button id="batchImportBtn" style="background:#16a34a;">📥 批量导入（覆盖已有）</button>
                <button id="batchAppendBtn" style="background:#3b82f6;">➕ 批量追加（保留原有）</button>
            </div>
            <div id="batchStatus" class="info-note"></div>
        </div>

        <label>物料号 (Part No.)</label>
        <div class="flex-buttons">
            <input type="text" id="partNo" placeholder="例如 PN12345" style="flex:3;">
            <button id="queryLocationBtn" style="margin-top:0;">🔍 查询位置</button>
        </div>
        <div id="queryResult" class="result-area" style="margin-top: 0.5rem;">输入物料号后点击查询</div>

        <label>手动添加/更新</label>
        <div class="flex-buttons">
            <input type="text" id="manualPart" placeholder="物料号" style="flex:1;">
            <input type="text" id="manualLoc" placeholder="存储位置" style="flex:2;">
            <button id="manualSaveBtn" style="margin-top:0;">💾 保存/更新</button>
        </div>

        <h3>📌 已保存的物料位置</h3>
        <div id="locationList" class="location-list">加载中...</div>
        <button id="exportBackupBtn" style="background:#6c86a3;">📎 导出备份 (CSV)</button>
        <div class="info-note">💡 数据保存在本浏览器中，可随时导出。批量导入格式：物料号,位置（每行一对）</div>
    </div>
    <div class="footer">⚡ 数据仅存本地，翻译功能需要网络连接，不翻译则完全离线可用。</div>
</div>

<script>
    // ================= 模块1：英文模板管理 =================
    const STORAGE_TEMPLATES = 'nmr_templates';
    let templates = [];

    function loadTemplates() {
        const stored = localStorage.getItem(STORAGE_TEMPLATES);
        if (stored) {
            templates = JSON.parse(stored);
        } else {
            templates = [
                "Item out of spec.",
                "Dimension out of tolerance.",
                "Surface scratch / dent.",
                "Foreign material / contamination.",
                "Crack observed.",
                "Missing feature.",
                "Wrong material / color.",
                "NMR peak shift / extra peak."
            ];
        }
        renderTemplateButtons();
    }

    function saveTemplates() {
        localStorage.setItem(STORAGE_TEMPLATES, JSON.stringify(templates));
    }

    function renderTemplateButtons() {
        const container = document.getElementById('templateButtons');
        container.innerHTML = '';
        templates.forEach((tpl, idx) => {
            const btn = document.createElement('div');
            btn.textContent = tpl.length > 35 ? tpl.slice(0,32)+'...' : tpl;
            btn.className = 'template-btn';
            btn.title = tpl;
            btn.addEventListener('click', () => {
                document.getElementById('defectDesc').value = tpl;
                updateAgileText();
            });
            container.appendChild(btn);
        });
        const clearBtn = document.createElement('div');
        clearBtn.textContent = '✖ 清空描述';
        clearBtn.className = 'template-btn';
        clearBtn.style.background = '#fecaca';
        clearBtn.addEventListener('click', () => {
            document.getElementById('defectDesc').value = '';
            updateAgileText();
        });
        container.appendChild(clearBtn);
    }

    document.getElementById('addTemplateBtn').addEventListener('click', () => {
        const newTpl = document.getElementById('newTemplate').value.trim();
        if (!newTpl) return;
        templates.push(newTpl);
        saveTemplates();
        renderTemplateButtons();
        document.getElementById('newTemplate').value = '';
    });

    // ================= 模块1：中文翻译 =================
    const zhInput = document.getElementById('zhInput');
    const translateBtn = document.getElementById('translateBtn');
    const translatedResultDiv = document.getElementById('translatedResult');
    const useTranslatedBtn = document.getElementById('useTranslatedBtn');
    const defectDescTextarea = document.getElementById('defectDesc');

    translateBtn.addEventListener('click', async () => {
        const chinese = zhInput.value.trim();
        if (!chinese) {
            alert('请先输入中文描述');
            return;
        }
        translatedResultDiv.innerText = '翻译中...';
        try {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(chinese)}&langpair=zh|en`;
            const response = await fetch(url);
            const data = await response.json();
            let translated = data.responseData.translatedText;
            translated = translated.replace(/&#39;/g, "'").replace(/&quot;/g, '"');
            if (translated && !translated.endsWith('.')) translated += '.';
            translatedResultDiv.innerText = translated;
        } catch (error) {
            translatedResultDiv.innerText = '翻译失败，请检查网络或API不可用';
            console.error(error);
        }
    });

    useTranslatedBtn.addEventListener('click', () => {
        const translatedText = translatedResultDiv.innerText;
        if (!translatedText || translatedText === '翻译中...' || translatedText.includes('翻译失败')) {
            alert('请先点击“翻译成简单英文”，获得有效翻译结果');
            return;
        }
        defectDescTextarea.value = translatedText;
        updateAgileText();
    });

    // 生成 Agile 文本
    const generateBtn = document.getElementById('generateBtn');
    const copyResultBtn = document.getElementById('copyResultBtn');
    const agileResultDiv = document.getElementById('agileResult');
    function updateAgileText() {
        const lot = document.getElementById('lotQty').value.trim() || '?';
        const reject = document.getElementById('rejectQty').value.trim() || '0';
        const desc = defectDescTextarea.value.trim() || 'No description.';
        const formatted = `Lot Qty: ${lot} | Reject Qty: ${reject} | Non-conforming: ${desc}`;
        agileResultDiv.innerText = formatted;
        return formatted;
    }
    generateBtn.addEventListener('click', updateAgileText);
    copyResultBtn.addEventListener('click', () => {
        const text = agileResultDiv.innerText;
        navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板')).catch(() => alert('复制失败，手动复制'));
    });
    updateAgileText();

    // ================= 模块2：库存位置管理 =================
    const STORAGE_STOCK = 'nmr_stock_map';
    let stockMap = {};

    function loadStockMap() {
        const stored = localStorage.getItem(STORAGE_STOCK);
        if (stored) {
            stockMap = JSON.parse(stored);
        } else {
            stockMap = {};
        }
        renderLocationList();
    }
    function saveStockMap() {
        localStorage.setItem(STORAGE_STOCK, JSON.stringify(stockMap));
        renderLocationList();
    }

    function renderLocationList() {
        const container = document.getElementById('locationList');
        const entries = Object.entries(stockMap);
        if (entries.length === 0) {
            container.innerHTML = '<div style="color:gray;">暂无记录，请批量导入或手动添加</div>';
            return;
        }
        let html = '';
        for (const [part, loc] of entries) {
            html += `<div class="loc-item">
                        <div><strong>${escapeHtml(part)}</strong> → ${escapeHtml(loc)}</div>
                        <div class="delete-btn" data-part="${escapeHtml(part)}">删除</div>
                     </div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const part = btn.getAttribute('data-part');
                if (confirm(`删除物料 ${part} 的位置记录？`)) {
                    delete stockMap[part];
                    saveStockMap();
                    const curPart = document.getElementById('partNo').value.trim();
                    if (curPart === part) document.getElementById('queryResult').innerHTML = '已删除该物料记录';
                }
            });
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function parseBatchText(text) {
        const lines = text.split(/\r?\n/);
        const map = {};
        for (let line of lines) {
            line = line.trim();
            if (!line) continue;
            let parts = line.split(',');
            if (parts.length < 2) continue;
            let material = parts[0].trim().replace(/^"|"$/g, '');
            let location = parts[1].trim().replace(/^"|"$/g, '');
            if (material && location) {
                map[material] = location;
            }
        }
        return map;
    }

    document.getElementById('batchImportBtn').addEventListener('click', () => {
        const text = document.getElementById('batchPaste').value;
        if (!text.trim()) { alert('请在文本框内粘贴数据'); return; }
        const newMap = parseBatchText(text);
        stockMap = newMap;
        saveStockMap();
        document.getElementById('batchStatus').innerHTML = `✅ 导入完成，共 ${Object.keys(stockMap).length} 条记录（覆盖模式）`;
        alert(`导入 ${Object.keys(stockMap).length} 条记录`);
    });

    document.getElementById('batchAppendBtn').addEventListener('click', () => {
        const text = document.getElementById('batchPaste').value;
        if (!text.trim()) { alert('请在文本框内粘贴数据'); return; }
        const appendMap = parseBatchText(text);
        let added = 0;
        for (const [k,v] of Object.entries(appendMap)) {
            if (!stockMap[k]) added++;
            stockMap[k] = v;
        }
        saveStockMap();
        document.getElementById('batchStatus').innerHTML = `✅ 追加完成，新增 ${added} 条，总计 ${Object.keys(stockMap).length} 条`;
        alert(`新增 ${added} 条，总计 ${Object.keys(stockMap).length} 条`);
    });

    document.getElementById('manualSaveBtn').addEventListener('click', () => {
        const part = document.getElementById('manualPart').value.trim();
        const loc = document.getElementById('manualLoc').value.trim();
        if (!part || !loc) { alert('物料号和位置都不能为空'); return; }
        stockMap[part] = loc;
        saveStockMap();
        document.getElementById('manualPart').value = '';
        document.getElementById('manualLoc').value = '';
        alert(`已保存 ${part} → ${loc}`);
    });

    document.getElementById('queryLocationBtn').addEventListener('click', () => {
        const part = document.getElementById('partNo').value.trim();
        const resultDiv = document.getElementById('queryResult');
        if (!part) { resultDiv.innerHTML = '❓ 请输入物料号'; return; }
        const loc = stockMap[part];
        if (loc) {
            resultDiv.innerHTML = `📍 物料 <strong>${escapeHtml(part)}</strong> 的存储位置：<span style="color:#2c7da0;">${escapeHtml(loc)}</span>`;
        } else {
            resultDiv.innerHTML = `⚠️ 未找到物料 ${escapeHtml(part)} 的位置记录。请通过批量导入或手动添加。`;
        }
    });

    document.getElementById('exportBackupBtn').addEventListener('click', () => {
        let csvContent = "物料号,存储位置\n";
        for (const [part, loc] of Object.entries(stockMap)) {
            csvContent += `"${part}","${loc}"\n`;
        }
        const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute("download", "nmr_stock_backup.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    });

    loadTemplates();
    loadStockMap();
</script>
</body>
</html>
